<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="16" fill="#1E0A3C"/>
  <!-- Llama body -->
  <ellipse cx="72" cy="90" rx="30" ry="22" fill="#9B6DFF"/>
  <!-- Neck -->
  <rect x="58" y="56" width="18" height="38" rx="9" fill="#9B6DFF"/>
  <!-- Head -->
  <ellipse cx="67" cy="48" rx="20" ry="17" fill="#9B6DFF"/>
  <!-- Snout -->
  <ellipse cx="74" cy="54" rx="10" ry="7" fill="#B89FFF"/>
  <!-- Ear left -->
  <path d="M52 36 L46 16 L60 30 Z" fill="#B89FFF"/>
  <!-- Ear right -->
  <path d="M76 32 L82 12 L88 30 Z" fill="#B89FFF"/>
  <!-- Eye -->
  <circle cx="60" cy="44" r="4.5" fill="#1E0A3C"/>
  <circle cx="61.5" cy="42.5" r="1.5" fill="#fff" opacity=".8"/>
  <!-- Nostril -->
  <circle cx="72" cy="56" r="2.5" fill="#7A50CC" opacity=".8"/>
  <circle cx="78" cy="56" r="2.5" fill="#7A50CC" opacity=".8"/>
  <!-- Front legs -->
  <rect x="48" y="104" width="12" height="20" rx="6" fill="#9B6DFF"/>
  <rect x="64" y="104" width="12" height="20" rx="6" fill="#9B6DFF"/>
  <!-- Back legs -->
  <rect x="80" y="104" width="12" height="20" rx="6" fill="#7A50CC"/>
  <rect x="94" y="104" width="12" height="20" rx="6" fill="#7A50CC"/>
  <!-- Tail -->
  <path d="M102 88 Q120 82 116 68" stroke="#B89FFF" stroke-width="7" fill="none" stroke-linecap="round"/>
</svg>
