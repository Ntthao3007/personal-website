<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="16" fill="#013243"/>
  <!-- 3D cube top face -->
  <polygon points="64,14 104,36 64,58 24,36" fill="#4DABCF"/>
  <!-- Left face -->
  <polygon points="24,36 24,80 64,102 64,58" fill="#2B8FAD"/>
  <!-- Right face -->
  <polygon points="104,36 104,80 64,102 64,58" fill="#7EC8E3"/>
  <!-- Dividing lines for matrix look -->
  <line x1="44" y1="25" x2="44" y2="91" stroke="#013243" stroke-width="1.5" opacity=".4"/>
  <line x1="84" y1="25" x2="84" y2="91" stroke="#013243" stroke-width="1.5" opacity=".4"/>
  <line x1="24" y1="58" x2="64" y2="80" stroke="#013243" stroke-width="1.5" opacity=".4"/>
  <line x1="64" y1="80" x2="104" y2="58" stroke="#013243" stroke-width="1.5" opacity=".4"/>
</svg>
