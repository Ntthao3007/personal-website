<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="16" fill="#243A5E"/>
  <!-- Three rising bar columns — Power BI style -->
  <rect x="16" y="82" width="26" height="32" rx="5" fill="#F2C811"/>
  <rect x="50" y="54" width="26" height="60" rx="5" fill="#F2C811" opacity=".88"/>
  <rect x="84" y="26" width="26" height="88" rx="5" fill="#F2C811" opacity=".75"/>
  <!-- Subtle highlight on tallest bar -->
  <rect x="86" y="28" width="8" height="84" rx="4" fill="#fff" opacity=".08"/>
</svg>
