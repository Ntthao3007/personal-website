  <!-- Bottom -->
  <rect x="48" y="84" width="32" height="32" rx="3" fill="#E15759"/>
  <!-- Left -->
  <rect x="12" y="48" width="32" height="32" rx="3" fill="#76B7B2"/>
  <!-- Right -->
